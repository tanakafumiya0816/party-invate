<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飲み会のお知らせ</title>

  <style>
    :root {
      --night-navy: #1b2438;
      --night-navy-deep: #131a2b;
      --lantern-red: #cf3b2b;
      --lantern-glow: #f0a860;
      --paper-cream: #f3ead8;
      --gold-line: #c9a24b;
      --ink: #2a2118;
      --ink-soft: #5a4f3f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Zen Kaku Gothic New", "Hiragino Kaku Gothic ProN", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--night-navy) 0%, var(--night-navy-deep) 55%, #0d1220 100%);
      min-height: 100vh;
      line-height: 1.8;
    }

    .mincho {
      font-family: "Shippori Mincho", serif;
    }

    /* 夜空の星（背景装飾） */
    .stars {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 20% 30%, rgba(255, 255, 255, 0.5), transparent),
        radial-gradient(1.5px 1.5px at 70% 20%, rgba(255, 255, 255, 0.4), transparent),
        radial-gradient(1px 1px at 40% 70%, rgba(255, 255, 255, 0.35), transparent),
        radial-gradient(1.5px 1.5px at 85% 60%, rgba(255, 255, 255, 0.4), transparent),
        radial-gradient(1px 1px at 10% 80%, rgba(255, 255, 255, 0.3), transparent),
        radial-gradient(1.5px 1.5px at 55% 45%, rgba(255, 255, 255, 0.4), transparent);
      pointer-events: none;
      animation: twinkle 4s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes twinkle {
      from {
        opacity: 0.5;
      }

      to {
        opacity: 1;
      }
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 64px 24px 96px;
    }

    .hero {
      text-align: center;
      margin-bottom: 56px;
    }

    .lantern-rows {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    .lantern-row {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 6px;
      flex-wrap: nowrap;
      width: fit-content;
      max-width: 100%;
      padding-top: 20px;
      border-top: 2px solid var(--gold-line);
    }

    .lantern-wrap {
      display: inline-block;
      animation-name: sway;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      transform-origin: top center;
      filter: drop-shadow(0 0 20px rgba(240, 168, 96, 0.3));
    }

    @keyframes sway {

      0%,
      100% {
        transform: rotate(-2.5deg);
      }

      50% {
        transform: rotate(2.5deg);
      }
    }

    .lantern-name {
      display: block;
      text-align: center;
      font-size: 12px;
      color: rgba(243, 234, 216, 0.7);
      letter-spacing: 0.1em;
      margin-top: 6px;
    }

    .glow {
      animation: flicker 3s ease-in-out infinite;
    }

    @keyframes flicker {

      0%,
      100% {
        opacity: 0.85;
      }

      50% {
        opacity: 1;
      }
    }

    .eyebrow {
      color: var(--lantern-glow);
      letter-spacing: 0.3em;
      font-size: 13px;
      margin: 24px 0 8px;
    }

    .hero h1 {
      color: var(--paper-cream);
      font-size: clamp(32px, 8vw, 44px);
      margin: 0 0 12px;
      letter-spacing: 0.08em;
    }

    .hero p.sub {
      color: rgba(243, 234, 216, 0.75);
      font-size: 15px;
      margin: 0;
    }

    .menu-card {
      background: var(--paper-cream);
      border-radius: 4px;
      padding: 36px 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      position: relative;
    }

    .menu-card::before,
    .menu-card::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold-line);
      top: 14px;
    }

    .menu-card::before {
      left: 14px;
    }

    .menu-card::after {
      right: 14px;
    }

    .menu-card h2 {
      font-size: 20px;
      margin: 0 0 20px;
      text-align: center;
      letter-spacing: 0.15em;
    }

    .detail-row {
      display: flex;
      gap: 18px;
      padding: 14px 0;
      border-bottom: 1px dashed var(--gold-line);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      flex: 0 0 88px;
      font-size: 13px;
      color: var(--ink-soft);
      letter-spacing: 0.1em;
      padding-top: 2px;
    }

    .detail-value {
      flex: 1;
      font-size: 16px;
    }

    .detail-value .note {
      display: block;
      font-size: 13px;
      color: var(--ink-soft);
      margin-top: 4px;
    }

    .rsvp {
      margin-top: 40px;
      text-align: center;
    }

    .rsvp p {
      color: rgba(243, 234, 216, 0.75);
      font-size: 14px;
      margin-bottom: 16px;
    }

    .rsvp-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: none;
      cursor: pointer;
      padding: 13px 28px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.08em;
      font-family: inherit;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:focus-visible {
      outline: 2px solid var(--lantern-glow);
      outline-offset: 3px;
    }

    .btn-primary {
      background: var(--lantern-red);
      color: var(--paper-cream);
      box-shadow: 0 8px 20px rgba(207, 59, 43, 0.4);
    }

    .btn-secondary {
      background: transparent;
      color: rgba(243, 234, 216, 0.85);
      border: 1px solid rgba(243, 234, 216, 0.35);
    }

    #rsvp-status {
      margin-top: 16px;
      font-size: 14px;
      color: var(--lantern-glow);
      min-height: 20px;
    }

    .footer-note {
      text-align: center;
      margin-top: 48px;
      font-size: 12px;
      color: rgba(243, 234, 216, 0.45);
      letter-spacing: 0.05em;
    }

    @media (max-width: 420px) {
      .menu-card {
        padding: 28px 18px;
      }

      .detail-row {
        flex-direction: column;
        gap: 4px;
      }

      .detail-label {
        flex: none;
      }
    }

    /* 視差効果を減らす設定のユーザーにはアニメーションを止める */
    @media (prefers-reduced-motion: reduce) {

      .lantern-wrap,
      .glow,
      .stars {
        animation: none !important;
      }
    }
  </style>

  <script>
    // Notionの「Webに公開」はサーバー処理を持たない静的ページなので、
    // ここでは押した合図を表示するだけ。実際の集計はGoogleフォーム等に誘導する想定。
    function respond(answer) {
      const statusEl = document.getElementById('rsvp-status');
      if (answer === '参加') {
        statusEl.textContent = '🏮 ありがとうございます！当日お待ちしています。';
      } else {
        statusEl.textContent = '承知しました。またの機会にぜひ。';
